services:
  # Сервис базы данных
  db:
    image: postgres:15
    container_name: movie_db_container
    environment:
      POSTGRES_DB: RecomendSystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 192837
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d RecomendSystem"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Твоё Spring Boot приложение
  app:
    build: .
    container_name: movie_app_container
    ports:
      - "8080:8080"
    environment:
      # Переменные для Spring Boot (подставятся в application.properties)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/RecomendSystem
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 192837
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy